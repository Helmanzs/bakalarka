- name: Set query facts (Time & Location)
  ansible.builtin.set_fact:
    vehicle_id: "186"
    query_start_time: "2024-12-02 17:42:54"
    query_end_time: "2024-12-02 17:52:54"
    min_lon: "13.0"
    max_lon: "15.0"
    min_lat: "50.0"
    max_lat: "51.0"
    clickhouse_query_id: "ansible-condition-{{ ansible_date_time.epoch }}"

- name: Set start datetime fact (Performance Timer)
  ansible.builtin.set_fact:
    start_datetime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

- name: Perform Range + Geo Lookup
  ansible.builtin.shell: |
    clickhouse-client \
      --query_id="{{ clickhouse_query_id }}" \
      --query="SELECT * FROM {{ db_table }}
               WHERE VehicleID = '{{ vehicle_id }}'
               AND GpsTime BETWEEN toDateTime('{{ query_start_time }}') AND toDateTime('{{ query_end_time }}')
               AND Longitude BETWEEN {{ min_lon }} AND {{ max_lon }}
               AND Latitude BETWEEN {{ min_lat }} AND {{ max_lat }};"
  register: query_execution
  changed_when: false

- name: Set end datetime fact (Performance Timer)
  ansible.builtin.set_fact:
    end_datetime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

- name: Get Query Timing
  ansible.builtin.include_tasks: helper/get_query_timing.yml
  vars:
    max_attempts: 6
    retry_delay: 5