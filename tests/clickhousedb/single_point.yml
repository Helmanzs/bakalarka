- name: Start ClickHouse VM
  hosts: clickhousedb
  gather_facts: false
  vars:
    vehicle_id: "186"
    target_timestamp: "2024-12-02 17:52:54"

  roles:
    - role: common
      create: false 
    - role: clickhousedb
      create: false

  tasks: 
    - name: Wait for ClickHouse to be available
      ansible.builtin.wait_for:
        host: "{{ db_host }}"
        port: "{{ db_port }}"
        delay: 2
        timeout: 60
        state: started

    - name: Set start datetime fact
      ansible.builtin.set_fact:
        start_datetime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

    - name: Perform indexed lookup
      ansible.builtin.shell: |
        clickhouse-client \
          --query="SELECT * FROM {{ db_table }} 
                  WHERE VehicleID = '{{ vehicle_id }}' 
                  AND GpsTime = toDateTime('{{ target_timestamp }}')"
      register: query_execution
      changed_when: false

    - name: Set end datetime fact
      ansible.builtin.set_fact:
        end_datetime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

    - name: Get Query Timing
      ansible.builtin.include_role:
        name: clickhousedb
        tasks_from: get_query_timing
      vars:
        max_attempts: 6
        retry_delay: 5

  post_tasks:
  - name: Post Processing
    ansible.builtin.include_role:
      name: post_processing
