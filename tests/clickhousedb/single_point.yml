- name: Start ClickHouse VM
  hosts: localhost
  vars_files:
    - "{{ ansible_vars_dir }}/host_vars/clickhousedb.yml"
  tasks:
    - name: Start VM
      ansible.builtin.include_tasks: "{{ ansible_common_dir }}/test/vm_init.yml"

- name: Execute Point Lookup Query
  hosts: clickhousedb
  vars:
    vehicle_id: "186"
    target_timestamp: "2024-12-02 17:52:54"
  tasks:
    - name: Wait for ClickHouse to be available
      ansible.builtin.wait_for:
        host: "{{ db_host }}"
        port: "{{ db_port }}"
        delay: 2
        timeout: 60
        state: started

    - name: Perform indexed lookup (cold cache)
      ansible.builtin.shell: |
        clickhouse-client \
          --query="SELECT * FROM {{ db_table }} 
                   WHERE VehicleID = '{{ vehicle_id }}' 
                   AND GpsTime = toDateTime('{{ target_timestamp }}')"
      register: query_execution
      changed_when: false

    - name: Get Query Timing
      ansible.builtin.include_role:
        name: clickhousedb
        tasks_from: get_query_timing
      vars:
        max_attempts: 6
        retry_delay: 5

- name: Post processing
  hosts: clickhousedb
  tasks:
    - name: Common post processing
      ansible.builtin.include_tasks: "{{ ansible_common_dir }}/test/vm_post_processing.yml"
