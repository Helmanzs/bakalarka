- name: Copy data
  ansible.builtin.copy:
    src: "{{ ansible_role_dir }}/{{ database }}/files/{{ data_gz }}"
    dest: "{{ import_dir }}/{{ data_gz }}"
    owner: clickhouse
    group: clickhouse
    mode: "0644"
    
- name: Clear table before import
  ansible.builtin.shell: |
    clickhouse-client -q "TRUNCATE TABLE {{ db_table }}"
  args:
    executable: /bin/bash
  register: truncate_result
  changed_when: true

- name: Set start datetime fact
  ansible.builtin.set_fact:
    start_datetime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

- name: Import data
  ansible.builtin.shell: |
    /usr/bin/time -f "DURATION_SECONDS=%e" \
    sudo clickhouse-client \
      -q "INSERT INTO {{ db_table }} FORMAT CSVWithNames COMPRESSION 'gzip'" \
      < {{ import_dir }}/{{ data_gz }}
  args:
    executable: /bin/bash
  register: query_execution
  changed_when: true

- name: Set end datetime fact
  ansible.builtin.set_fact:
    end_datetime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

- name: Remove data file
  ansible.builtin.file:
    path: "{{ import_dir }}/{{ data_file }}"
    state: absent