- name: Start IoTDB VM
  hosts: iotdb
  gather_facts: false
  vars:
    vehicle_id: "186"
    start_target_timestamp: "1733161973500" #"2024-12-02T17:52:54"
    end_target_timestamp:   "1733161984000" #"2024-12-02T17:53:04"

  roles:
    - role: common
      create: false
    - role: iotdb
      create: false

  tasks:
    - name: Wait for IoTDB to be available
      ansible.builtin.wait_for:
        host: "{{ db_host }}"
        port: "{{ db_port }}"
        delay: 2
        timeout: 60
        state: started

    - name: Set start datetime fact
      ansible.builtin.set_fact:
        start_datetime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

    - name: Perform indexed lookup
      ansible.builtin.shell: |
        /iotdb/sbin/start-cli.sh \
        -h {{ db_host }} -p {{ db_port}} -e \
        "SELECT * FROM root.sus_uk.vehicle_{{ vehicle_id }} \
        WHERE time >= {{ start_target_timestamp }} \
        AND time <= {{ end_target_timestamp }};"
      register: query_result
      changed_when: false
    
    - name: Set end datetime fact
      ansible.builtin.set_fact:
        end_datetime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"
    
    - name: Capture total line number
      ansible.builtin.set_fact:
        rows_returned: "{{ query_result.stdout | regex_search('Total line number = ([0-9]+)', '\\1') | first }}"

    - name: Capture query duration in seconds
      ansible.builtin.set_fact:
        query_duration_ms: "{{ query_result.stdout | regex_search('It costs ([0-9.]+)s', '\\1') | first }}"

  post_tasks:
  - name: Post Processing
    ansible.builtin.include_role:
      name: post_processing