- name: Start MariaDB VM
  hosts: mariadb
  gather_facts: false
  vars:
    vehicle_id: "186"
    target_timestamp: "2024-12-02T17:52:54"

  roles:
    - role: common
      create: false
    - role: mariadb
      create: false

  tasks:
    - name: Wait for MariaDB to start
      ansible.builtin.wait_for:
        path: "{{ socket }}"
        state: present
        timeout: 60

    - name: Set start datetime fact
      ansible.builtin.set_fact:
        start_datetime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"
    
    - name: Empty table before import
      ansible.builtin.shell: |
        mysql {{ db_database }} -S {{ socket }} -e "TRUNCATE TABLE {{ db_table }};"
      args:
        executable: /bin/bash
      changed_when: true

    - name: Copy data
      ansible.builtin.copy:
        src: "{{ ansible_role_dir }}/{{ vm_name }}/files/{{ data_tar }}"
        dest: "{{ import_dir }}/{{ data_tar }}"
        mode: "0777"

    - name: Extract data
      ansible.builtin.shell: |
        tar --extract --use-compress-program=pigz \
        --file="{{ import_dir }}/{{ data_tar }}" \
        --directory="{{ import_dir }}"
        rm -f "{{ import_dir }}/{{ data_tar }}"
        chmod -R 0777 "{{ import_dir }}"
      args:
        executable: /bin/bash
      changed_when: true

    - name: Disable keys
      ansible.builtin.shell: |
        mysql {{ db_database }} -S {{ socket }} -e "ALTER TABLE {{ db_table }} DISABLE KEYS;"
      args:
        executable: /bin/bash
      changed_when: false

    - name: Import data
      ansible.builtin.shell: |
        /usr/bin/time -f "DURATION_SECONDS=%e" \
        mysql {{ db_database }} -S {{ socket }} -e "
        LOAD DATA INFILE '{{ import_dir }}/{{ data_file }}'
        INTO TABLE {{ db_table }}
        FIELDS TERMINATED BY ',' ENCLOSED BY '\"' 
        LINES TERMINATED BY '\n' 
        IGNORE 1 ROWS
        (
            orig_id,
            @orig_time,
            orig_topic,
            @CreatedTime,
            @GpsTime,
            GsmSignal,
            SatelliteCount,
            LicensePlate,
            VehicleType,
            Company,
            VehicleID,
            Technology,
            Ignition,
            Longitude,
            Latitude,
            SpeedGps,
            SpeedTach,
            SpeedCan,
            TachoGps,
            TachoTach,
            ModeDrive,
            SpreadingMode,
            Plow,
            Gram,
            WidthLeft,
            WidthRight,
            SumSalt,
            SumInert,
            SumBrine,
            Cuts1,
            Cuts2,
            Cuts3,
            CentralBroom,
            LeftBroom,
            RightBroom,
            Turbine,
            RunningShaft,
            LeftFlushing,
            RightFlushing,
            CentralFlushing,
            Misting,
            Pump,
            LightOn,
            ModeArrow,
            AkuVoltage,
            RampUp,
            Crash,
            TempAir,
            TempRoad,
            Revs,
            RevsExtension,
            Fuel,
            LevelPHM,
            PowerVoltage,
            Lighthouse
        )
        SET
            orig_time   = STR_TO_DATE(@orig_time, '%Y-%m-%dT%H:%i:%s.%f'),
            CreatedTime = STR_TO_DATE(@CreatedTime, '%Y-%m-%dT%H:%i:%s.%f'),
            GpsTime     = STR_TO_DATE(@GpsTime, '%Y-%m-%dT%H:%i:%s.%f');"
      args:
        executable: /bin/bash
      register: query_execution
      changed_when: true

    - name: Set end datetime fact
      ansible.builtin.set_fact:
        end_datetime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

    - name: Enable keys
      ansible.builtin.shell: |
        mysql {{ db_database }} -S {{ socket }} -e "ALTER TABLE {{ db_table }} ENABLE KEYS;"
      args:
        executable: /bin/bash
      changed_when: false

    - name: Remove data file
      ansible.builtin.file:
        path: /var/lib/mysql-files/{{ data_file }}
        state: absent
    
  post_tasks:
  - name: Post Processing
    ansible.builtin.include_role:
      name: post_processing