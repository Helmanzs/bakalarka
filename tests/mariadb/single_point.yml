- name: Start MariaDB VM
  hosts: localhost
  vars_files:
    - "{{ ansible_vars_dir }}/host_vars/mariadb.yml"
  tasks:
    - name: Start VM
      ansible.builtin.include_tasks: "{{ ansible_common_dir }}/test/vm_init.yml"

- name: Execute Point Lookup Query
  hosts: mariadb
  vars:
    vehicle_id: "186"
    target_timestamp: "2024-12-02T17:52:54"
  tasks:

    - name: Perform indexed lookup (cold cache) and measure duration
      ansible.builtin.shell: |
        /usr/bin/time -f "DURATION_SECONDS=%e" \
        mysql {{ login_db }} -S /var/run/mysqld/mysqld.sock -e \
        "SELECT VehicleID FROM {{ collection }} WHERE VehicleID = {{ vehicle_id }} AND GpsTime = '{{ target_timestamp }}';"
      register: query_execution
      changed_when: false
    
    - name: Get number of rows returned
      ansible.builtin.shell: |
        mysql {{ login_db }} -S /var/run/mysqld/mysqld.sock -e \
        "SELECT count(VehicleID) FROM {{ collection }} WHERE VehicleID = {{ vehicle_id }} AND GpsTime = '{{ target_timestamp }}';"
      register: query_rows_returned
      changed_when: false

    - name: Get rows returned
      ansible.builtin.set_fact:
        rows_returned: "{{ (query_rows_returned.stdout | regex_search('(?im)(\\d+)', '\\1'))[0] | int }}"

- name: Post processing
  hosts: mariadb
  tasks:
    - name: Common post processing
      ansible.builtin.include_tasks: "{{ ansible_common_dir }}/test/vm_post_processing.yml"