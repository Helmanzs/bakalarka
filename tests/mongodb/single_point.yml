- name: Start MongoDB VM
  hosts: mongodb
  gather_facts: false
  vars:
    vehicle_id: "186"
    target_timestamp: "2024-12-02T17:52:54"

  roles:
    - role: common
      create: false
    - role: mongodb
      create: false

  tasks:
    - name: Set start datetime fact
      ansible.builtin.set_fact:
        start_datetime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

    - name: Perform indexed lookup
      ansible.builtin.shell: |
        /usr/bin/time -f "DURATION_SECONDS=%e" \
        mongosh --eval 'use {{ db_database }};' \
        --eval 'db.{{ db_table }}.find({ VehicleID: {{ vehicle_id }}, GpsTime: ISODate("{{ target_timestamp }}")})'
      register: query_execution
      changed_when: false

    - name: Set end datetime fact
      ansible.builtin.set_fact:
        end_datetime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

    - name: Get number of rows returned
      ansible.builtin.shell: |
        mongosh --eval 'use {{ db_database }};' \
        --eval 'db.{{ db_table }}.countDocuments({ VehicleID: {{ vehicle_id }}, GpsTime: ISODate("{{ target_timestamp }}")})'
      register: query_rows_returned
      changed_when: false

    - name: Get rows returned
      ansible.builtin.set_fact:
        rows_returned: "{{ query_rows_returned.stdout | int }}"

  post_tasks:
  - name: Post Processing
    ansible.builtin.include_role:
      name: post_processing