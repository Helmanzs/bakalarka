- name: Read token from .bashrc
  ansible.builtin.shell: grep INFLUXDB3_AUTH_TOKEN /root/.bashrc | cut -d'=' -f2
  register: influxdb_token
  become: true

- name: Set token fact
  ansible.builtin.set_fact:
    influxdb_token: "{{ influxdb_token.stdout | trim('\"') }}"
  no_log: true

- name: Copy data
  ansible.builtin.copy:
    src: "{{ ansible_role_dir }}/{{ vm_name }}/files/{{ data_tar }}"
    dest: "{{ import_dir }}/{{ data_tar }}"
    mode: "0644"
  become: true

- name: Extract data
  ansible.builtin.shell: |
    tar --extract --use-compress-program=pigz \
    --file="{{ import_dir }}/{{ data_tar }}" \
    --directory="{{ import_dir }}"
    rm -f "{{ import_dir }}/{{ data_tar }}"
    chmod -R 0644 "{{ import_dir }}"
  args:
    executable: /bin/bash
  changed_when: true
  become: true

- name: Create chunk directory
  ansible.builtin.file:
    path: "{{ temp_dir }}"
    state: directory
  become: true

- name: Split and compress file into chunks
  ansible.builtin.shell: |
    split -l 10000 /tmp/{{ data_file }} {{ temp_dir }}/chunk_
    pigz {{ temp_dir }}/chunk_*
  args:
    executable: /bin/bash
  become: true

- name: Set start datetime fact
  ansible.builtin.set_fact:
    start_datetime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

- name: Upload compressed chunks to InfluxDB
  ansible.builtin.shell: |
    /usr/bin/time -f "DURATION_SECONDS=%e" bash -c '
      find {{ temp_dir }} -name "*.gz" | xargs -n1 -P$(nproc) -I{} \
        curl --silent --show-error --fail \
          --request POST "http://{{ db_host }}:{{ db_port }}/api/v2/write?org=ignored&bucket={{ db_table }}" \
          --header "Authorization: Token {{ influxdb_token }}" \
          --header "Content-Type: text/plain; charset=utf-8" \
          --header "Content-Encoding: gzip" \
          --data-binary @"{}"
    '
  register: query_execution
  become: true

- name: Set end datetime fact
  ansible.builtin.set_fact:
    end_datetime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"