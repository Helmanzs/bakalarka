- name: Start InfluxDB VM
  hosts: localhost
  vars_files:
    - "{{ ansible_vars_dir }}/host_vars/influxdb.yml"
  tasks:
    - name: Start VM
      ansible.builtin.include_tasks: "{{ ansible_common_dir }}/test/vm_init.yml"
    
- name: Execute Point Lookup Query
  hosts: influxdb
  vars:
    vehicle_id: "186"
    target_timestamp: "2024-12-02T17:52:54Z"
    influx_token: "{{ db_token }}"
  tasks:
    - name: Wait for InfluxDB to be available
      ansible.builtin.wait_for:
        host: "{{ db_host }}"
        port: "{{ db_port }}"
        delay: 2
        timeout: 60
        state: started

    - name: Read token from .bashrc
      ansible.builtin.shell: grep INFLUXDB3_AUTH_TOKEN /root/.bashrc | cut -d'=' -f2
      register: influxdb_token

    - name: Set token fact
      ansible.builtin.set_fact:
        influxdb_token: "{{ influxdb_token.stdout | trim('\"') }}"

    - name: Perform indexed lookup (cold cache) and measure duration
      ansible.builtin.shell: |
        /usr/bin/time -f "DURATION_SECONDS=%e" \
        influxdb3 query \
          --database {{ db_table }} \
          --format csv \
          "SELECT * FROM {{ db_table }} \
          WHERE (\"VehicleID\") = '{{ vehicle_id }}' \
          AND time = timestamp '{{ target_timestamp }}'" \
        | sed -n '2p'
      environment:
        PATH: "/usr/local/bin:/usr/bin:/root/.influxdb"
        INFLUXDB3_AUTH_TOKEN: "{{ influxdb_token }}"
      register: query_execution
      changed_when: false

    - name: Get number of rows returned
      ansible.builtin.shell: |
        influxdb3 query \
          --database {{ db_table }} \
          --format csv \
          "SELECT count(*) FROM {{ db_table }} \
          WHERE (\"VehicleID\") = '{{ vehicle_id }}' \
          AND time = timestamp '{{ target_timestamp }}'" \
        | sed -n '2p'
      environment:
        PATH: "/usr/local/bin:/usr/bin:/root/.influxdb"
        INFLUXDB3_AUTH_TOKEN: "{{ influxdb_token }}"
      register: query_rows_returned
      changed_when: false

- name: Post processing
  hosts: influxdb
  tasks:
    - name: Common post processing
      ansible.builtin.include_tasks: "{{ ansible_common_dir }}/test/vm_post_processing.yml"
