- name: Start QuestDB VM
  hosts: questdb
  gather_facts: false
  vars:
    vehicle_id: "186"
    target_timestamp: "2024-12-02T17:52:54"

  roles:
    - role: common
      create: false
    - role: questdb
      create: false

  tasks:
    - name: Wait for QuestDB port to be available
      ansible.builtin.wait_for:
        host: "{{ db_host }}"
        port: "{{ db_port }}"
        delay: 3
        timeout: 30

    - name: Push and extract data
      ansible.builtin.unarchive:
        src: "{{ ansible_role_dir }}/{{ vm_name }}/files/{{ data_tar }}"
        dest: "/root/.questdb/import/"
        mode: "0777"

    - name: Set start datetime fact
      ansible.builtin.set_fact:
        start_datetime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

    - name: Record start time
      ansible.builtin.command:
        cmd: date +%s.%N
      register: start_time
      changed_when: false

    - name: Import data
      ansible.builtin.shell: |
        psql postgresql://{{ db_user }}:{{ db_password }}@{{ db_host }}:{{ db_port }}/{{ db_database }} \
        -c "COPY {{ db_table }} FROM '{{ data_file }}' WITH HEADER;"
      register: insert_time
      args:
        executable: /bin/bash
      changed_when: true

    - name: Wait for import to finish
      community.postgresql.postgresql_query:
        query: SELECT COUNT(*) AS count FROM {{ db_table }};
        login_host: "{{ db_host }}"
        login_port: "{{ db_port }}"
        login_user: "{{ db_user }}"
        login_password: "{{ db_password }}"
        login_db: "{{ db_database }}"
      register: result
      until: (result.query_result is defined and result.query_result | length > 0 and (result.query_result[0].count | int) >= 600000)
      retries: "{{ db_import_retries }}"
      delay: "{{ db_import_retry_inverval }}"

    - name: Set end datetime fact
      ansible.builtin.set_fact:
        end_datetime: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

    - name: Record end time
      ansible.builtin.command:
        cmd: date +%s.%N
      register: end_time
      changed_when: false

    - name: Format total duration
      ansible.builtin.set_fact:
        total_duration_output: >-
          DURATION_SECONDS={{ '%.2f' | format((end_time.stdout | float) - (start_time.stdout | float)) }}

    - name: Register total duration
      ansible.builtin.set_fact:
        query_execution:
          stderr_lines: ["{{ total_duration_output }}"]

    - name: Remove data file
      ansible.builtin.file:
        path: /root/.questdb/import/{{ data_file }}
        state: absent

  post_tasks:
  - name: Post Processing
    ansible.builtin.include_role:
      name: post_processing
