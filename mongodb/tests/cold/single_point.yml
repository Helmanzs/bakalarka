- name: Start MongoDB VM
  hosts: localhost
  vars_files:
    - "{{ ansible_vars_dir }}/host_vars/mongodb.yml"
  tasks:
    - name: Start VM
      ansible.builtin.include_tasks: "{{ ansible_common_dir }}/test/vm_init.yml"

- name: Execute Point Lookup Query
  hosts: mongodb
  vars:
    vehicle_id: "186"
    target_timestamp: "2024-12-02T17:52:54"
  tasks:
    - name: Perform indexed lookup (cold cache) and measure duration
      ansible.builtin.shell: |
        /usr/bin/time -f "DURATION_SECONDS=%e" \
        mongosh --eval 'use {{ login_db }};' \
        --eval 'db.{{ collection }}.find({ VehicleID: {{ vehicle_id }}, GpsTime: ISODate("{{ target_timestamp }}")})'
      register: query_execution
      changed_when: false

    - name: Get number of rows returned
      ansible.builtin.shell: |
        mongosh --eval 'use {{ login_db }};' \
        --eval 'db.{{ collection }}.countDocuments({ VehicleID: {{ vehicle_id }}, GpsTime: ISODate("{{ target_timestamp }}")})'
      register: query_rows_returned
      changed_when: false

    - name: Get rows returned
      ansible.builtin.set_fact:
        rows_returned: "{{ query_rows_returned.stdout | int }}"

- name: Post processing
  hosts: mongodb
  tasks:
    - name: Common post processing
      ansible.builtin.include_tasks: "{{ ansible_common_dir }}/test/vm_post_processing.yml"