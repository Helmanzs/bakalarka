---
- name: Validate test parameters
  hosts: localhost
  gather_facts: false
  vars_files:
    - "{{ ansible_vars_dir }}/test_types.yml"

  vars:
    caches:
      - hot
      - cold

  tasks:
    - name: Include parameter validation tasks
      include_tasks: "{{ ansible_common_dir }}/test/vm_validate.yml"


- name: Initialize results system
  hosts: localhost
  tasks:
    - name: Check if results directory exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/results"
      register: results_dir_stat

    - name: Create results directory
      ansible.builtin.file:
        path: "{{ playbook_dir }}/results"
        state: directory
        mode: "0755"

    - name: Set facts on hosts
      set_fact:
        global_results_dir: "{{ project_root }}/results"
        is_master_run: true
        test_type: "{{ test_type }}"
      delegate_to: "{{ database }}"
      delegate_facts: true


- name: Run database
  import_playbook: "{{ database }}/tests/{{ cache }}/{{ test_type }}.yml"
