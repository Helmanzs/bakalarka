---
- name: Install packages
  ansible.builtin.apt:
    name: "{{ vm_packages }}"
    cache_valid_time: "{{ apt_cache_valid_time_base }}"
    state: present
    update_cache: true
  when: vm_packages is defined and vm_packages | length > 0
  
- name: Download InfluxDB3
  ansible.builtin.unarchive:
    src: "{{ db_tar_url }}"
    dest: /influxdb/
    extra_opts:
      - "--strip-components=1"
    remote_src: true
    mode: "0777"

- name: Update PATH environment variable
  ansible.builtin.lineinfile:
    path: /root/.bashrc
    line: 'export PATH="$PATH:/root/.influxdb"'
    create: true
    mode: "0600"

- name: Create systemd service
  ansible.builtin.template:
    src: influxdb3.service.j2
    dest: /etc/systemd/system/influxdb3.service
    mode: "0644"

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start InfluxDB service
  ansible.builtin.systemd:
    name: influxdb3
    state: started
    enabled: true