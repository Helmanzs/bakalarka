---
ram_profile: "ram2"
cpu_profile: "cpu1"

keyring: "/usr/share/keyrings/clickhouse-keyring.gpg"
import_dir: "/var/lib/clickhouse/user_files"

vm_packages:
  - apt-transport-https
  - ca-certificates

vm_disk_size: 6GB

# FILE VARS
#data_file: "raltra.csv"

# DB VARS
db_host: localhost
db_port: 9000

db_table: car_telemetry

db_download_url: "."
db_key_url: "https://packages.clickhouse.com/rpm/lts/repodata/repomd.xml.key"
db_engine: "MergeTree"
