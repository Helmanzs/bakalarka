---
- name: Install packages
  ansible.builtin.apt:
    name: "{{ vm_packages }}"
    cache_valid_time: "{{ apt_cache_valid_time_base }}"
    state: present
    update_cache: true
  when: vm_packages is defined and vm_packages | length > 0
  
- name: Download GPG key
  ansible.builtin.apt_key:
    url: "{{ gpg_key_url }}"
    keyring: /usr/share/keyrings/mongodb-server-8.0.gpg
    state: present
    validate_certs: true

- name: Gather distribution facts
  ansible.builtin.setup:
    gather_subset:
      - distribution

- name: Add Mongo APT repository
  ansible.builtin.apt_repository:
    repo: >
      deb [arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-8.0.gpg]
      https://repo.mongodb.org/apt/ubuntu 
      {{ ansible_facts['distribution_release'] | lower }}/mongodb-org/8.0 
      multiverse
    state: present
    filename: mongodb-org-8.0.list
    update_cache: true
  register: repo_result
  retries: 5
  delay: 10
  until: repo_result is succeeded

- name: Install MongoDB
  ansible.builtin.apt:
    name: 
      - mongodb-org
      - mongodb-mongosh
    update_cache: true
  environment:
    DEBIAN_FRONTEND: noninteractive
  register: result
  retries: 5
  delay: 10
  until: result is succeeded

- name: Bind MongoDB to all interfaces
  ansible.builtin.lineinfile:
    path: /etc/mongod.conf
    regexp: '^\s*bindIp:'
    line: '  bindIp: 0.0.0.0'
  notify: restart mongodb

- name: Start MongoDB service
  ansible.builtin.service:
    name: mongod
    state: started
    enabled: true