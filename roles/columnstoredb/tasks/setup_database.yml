---
- name: Create cross_engine user
  community.mysql.mysql_user:
    name: cross_engine
    password: cross_engine
    host: "{{ item }}"
    priv: "*.*:SELECT,PROCESS"
    state: present
    login_unix_socket: "{{ socket }}"
  loop: "{{ db_user_host }}"

- name: Restart services
  ansible.builtin.service:
    name: "{{ item }}"
    state: restarted
  loop:
    - mariadb
    - mariadb-columnstore

- name: Create database
  community.mysql.mysql_db:
    login_unix_socket: "{{ socket }}"
    name: "{{ login_db }}"
    state: present

- name: Create ColumnStore table
  community.mysql.mysql_query:
    login_unix_socket: "{{ socket }}"
    query: |
      CREATE TABLE {{ login_db }}.{{ db_table }} (
        orig_id INT,
        orig_time DATETIME,
        orig_topic TINYTEXT,
        CreatedTime DATETIME,
        GpsTime DATETIME,
        GsmSignal SMALLINT UNSIGNED,
        SatelliteCount SMALLINT UNSIGNED,
        LicensePlate VARCHAR(10),
        VehicleType TINYINT UNSIGNED,
        Company VARCHAR(10),
        VehicleID INT UNSIGNED,
        Technology SMALLINT UNSIGNED,
        Ignition SMALLINT UNSIGNED,
        Longitude DECIMAL(14, 10),
        Latitude DECIMAL(14, 10),
        SpeedGps DECIMAL(9, 3),
        SpeedTach DECIMAL(9, 3),
        SpeedCan DECIMAL(9, 3),
        TachoGps DECIMAL(9, 3),
        TachoTach DECIMAL(9, 3),
        ModeDrive SMALLINT UNSIGNED,
        SpreadingMode SMALLINT UNSIGNED,
        Plow SMALLINT UNSIGNED,
        Gram BIGINT UNSIGNED,
        WidthLeft DECIMAL(9, 3),
        WidthRight DECIMAL(9, 3),
        SumSalt DECIMAL(18, 8) UNSIGNED,
        SumInert DECIMAL(18, 8) UNSIGNED,
        SumBrine DECIMAL(18, 8) UNSIGNED,
        Cuts1 SMALLINT UNSIGNED,
        Cuts2 SMALLINT UNSIGNED,
        Cuts3 SMALLINT UNSIGNED,
        CentralBroom SMALLINT UNSIGNED,
        LeftBroom SMALLINT UNSIGNED,
        RightBroom SMALLINT UNSIGNED,
        Turbine SMALLINT UNSIGNED,
        RunningShaft SMALLINT UNSIGNED,
        LeftFlushing SMALLINT UNSIGNED,
        RightFlushing SMALLINT UNSIGNED,
        CentralFlushing SMALLINT UNSIGNED,
        Misting SMALLINT UNSIGNED,
        Pump SMALLINT UNSIGNED,
        LightOn SMALLINT UNSIGNED,
        ModeArrow SMALLINT UNSIGNED,
        AkuVoltage DECIMAL(9, 3),
        RampUp SMALLINT UNSIGNED,
        Crash SMALLINT UNSIGNED,
        TempAir DECIMAL(9, 3),
        TempRoad DECIMAL(9, 3),
        Revs DECIMAL(18, 10) UNSIGNED,
        RevsExtension SMALLINT UNSIGNED,
        Fuel DECIMAL(9, 3),
        LevelPHM DECIMAL(9, 3),
        PowerVoltage DECIMAL(9, 3),
        Lighthouse SMALLINT UNSIGNED
      ) ENGINE=Columnstore