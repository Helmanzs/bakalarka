---
- name: Create TimescaleDB extension
  community.postgresql.postgresql_ext:
    name: timescaledb
    login_db: "{{ db_database }}"

- name: Create table
  community.postgresql.postgresql_query:
    login_db: "{{ db_database }}"
    query: |
      CREATE TABLE {{ db_table }} (
        orig_id INTEGER,
        orig_time TIMESTAMPTZ,
        orig_topic TEXT,
        createdtime TIMESTAMPTZ,
        gpstime TIMESTAMPTZ NOT NULL,
        gsmsignal SMALLINT,
        satellitecount SMALLINT,
        licenseplate TEXT,
        vehicletype SMALLINT,
        company TEXT,
        vehicleid INTEGER,
        technology SMALLINT,
        ignition SMALLINT,
        longitude DECIMAL(9,5),
        latitude DECIMAL(8,5),
        speedgps DECIMAL(6,2),
        speedtach DECIMAL(6,2),
        speedcan DECIMAL(6,2),
        tachogps DECIMAL(6,2),
        tachotach DECIMAL(6,2),
        modedrive SMALLINT,
        spreadingmode SMALLINT,
        plow SMALLINT,
        gram INTEGER,
        widthleft DECIMAL(4,2),
        widthright DECIMAL(4,2),
        sumsalt DOUBLE PRECISION,
        suminert DOUBLE PRECISION,
        sumbrine DOUBLE PRECISION,
        cuts1 SMALLINT,
        cuts2 SMALLINT,
        cuts3 SMALLINT,
        centralbroom SMALLINT,
        leftbroom SMALLINT,
        rightbroom SMALLINT,
        turbine SMALLINT,
        runningshaft SMALLINT,
        leftflushing SMALLINT,
        rightflushing SMALLINT,
        centralflushing SMALLINT,
        misting SMALLINT,
        pump SMALLINT,
        lighton SMALLINT,
        modearrow SMALLINT,
        akuvoltage DECIMAL(4,2),
        rampup SMALLINT,
        crash SMALLINT,
        tempair DECIMAL(6,2),
        temproad DECIMAL(5,2),
        revs DOUBLE PRECISION,
        revsextension INTEGER,
        fuel DECIMAL(6,2),
        levelphm DECIMAL(6,2),
        powervoltage DECIMAL(5,2),
        lighthouse SMALLINT
      );

- name: Convert table to hypertable
  community.postgresql.postgresql_query:
    login_db: "{{ db_database }}"
    query: "SELECT create_hypertable('{{ db_table }}', 'gpstime');"