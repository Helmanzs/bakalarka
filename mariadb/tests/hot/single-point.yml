- name: Start ClickHouse VM
  hosts: localhost
  vars_files:
    - /etc/ansible/host_vars/clickhousedb.yml
  tasks:
    - name: Include ram profile
      ansible.builtin.include_vars:
        file: "{{ resources_dir }}/ram/{{ ram_profile | default(default_ram_profile) }}.yml"

    - name: Include cpu profile
      ansible.builtin.include_vars:
        file: "{{ resources_dir }}/cpu/{{ cpu_profile | default(default_cpu_profile) }}.yml"

    - name: Start VM if stopped
      community.general.lxd_container:
        name: "{{ vm_name }}"
        state: started
      register: vm_start
      changed_when: vm_start.changed

    - name: Get VM state
      ansible.builtin.command:
        cmd: "lxc info {{ vm_name }}"
      register: vm_state
      failed_when: false
      changed_when: false

    - name: Extract IP address from container
      ansible.builtin.set_fact:
        vm_ip: "{{ (vm_state.stdout | regex_findall('inet:\\s*(\\d+\\.\\d+\\.\\d+\\.\\d+)'))[0] }}"

    - name: Wait for SSH to be available
      ansible.builtin.wait_for:
        host: "{{ vm_ip }}"
        port: 22
        timeout: 300
        delay: 5

- name: Execute Point Lookup Query
  hosts: clickhousedb
  vars:
    vehicle_id: "186"
    target_timestamp: "2024-12-02 17:52:54"
  tasks:
    - name: Wait for ClickHouse to be available
      ansible.builtin.wait_for:
        host: "{{ db_host }}"
        port: "{{ db_port }}"
        delay: 2
        timeout: 60
        state: started

    - name: Perform indexed lookup (cold cache)
      ansible.builtin.shell: |
        clickhouse-client \
          --query="SELECT * FROM {{ collection }} 
                   WHERE VehicleID = '{{ vehicle_id }}' 
                   AND GpsTime = toDateTime('{{ target_timestamp }}')"
      register: query_execution
      changed_when: false

    - name: Capture query timing
      ansible.builtin.shell: |
        clickhouse-client \
          --query="
            SELECT 
              query_duration_ms,
              read_rows,
              result_rows
            FROM system.query_log
            WHERE type = 'QueryFinish'
              AND query LIKE '%VehicleID = ''{{ vehicle_id }}''%'
              AND query LIKE '%GpsTime = toDateTime(''{{ target_timestamp }}'')%'
            ORDER BY event_time DESC
            LIMIT 1"
      register: timing_results
      changed_when: false

    - name: Parse latency metrics
      ansible.builtin.set_fact:
        latency_parts: "{{ timing_results.stdout_lines[0].split('\t') }}"

    - name: Extract individual metrics as facts
      ansible.builtin.set_fact:
        query_duration_ms: "{{ latency_parts[0] | float }}"
        rows_read: "{{ latency_parts[1] | int }}"
        rows_returned: "{{ latency_parts[2] | int }}"

    - name: Save result if in master run
      when: is_master_run | default(false)
      block:
        - name: Set local result fact on each host
          ansible.builtin.set_fact:
            local_result:
              test_type: "{{ hostvars['localhost'].test_type }}"
              db: "{{ vm_name }}"
              host: "{{ inventory_hostname }}"
              query_duration_ms: "{{ query_duration_ms }}"
              rows_read: "{{ rows_read }}"
              rows_returned: "{{ rows_returned }}"
              ram_limit: "{{ hostvars['localhost'].ram_limit }}"
              cpu_limit: "{{ hostvars['localhost'].cpu_limit }}"
              playbook_runtime_seconds: "{{ hostvars['localhost'].playbook_duration_seconds }}"

        - name: Append this host’s result to NDJSON file
          delegate_to: localhost
          ansible.builtin.lineinfile:
            path: "{{ results_dir }}/{{ hostvars['localhost'].test_type }}_results.ndjson"
            create: true
            insertafter: EOF
            line: "{{ local_result | to_json }}"

    - name: Stop VM
      community.general.lxd_container:
        name: "{{ vm_name }}"
        state: stopped
      failed_when: false
      changed_when: false
      delegate_to: localhost
