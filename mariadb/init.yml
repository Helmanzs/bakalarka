---
- name: Init MariaDB VM
  hosts: localhost
  vars_files:
    - "{{ ansible_vars_dir }}/host_vars/mariadb.yml"
  tasks:
    - name: Init VM
      ansible.builtin.include_tasks: "{{ ansible_common_dir }}/init/vm_init.yml"

- name: Common config
  hosts: mariadb
  tasks:
    - name: Common VM Config
      ansible.builtin.include_tasks: "{{ ansible_common_dir }}/init/vm_config.yml"

- name: Setup database and import data
  hosts: mariadb
  vars:
    import_dir: "/var/lib/mysql-files"
  tasks:
    - name: Create database
      community.mysql.mysql_db:
        name: "{{ login_db }}"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Create table
      community.mysql.mysql_query:
        login_unix_socket: /var/run/mysqld/mysqld.sock
        login_db: "{{ login_db }}"
        query: >
          CREATE TABLE IF NOT EXISTS {{ collection }} (
            id INT NOT NULL AUTO_INCREMENT,
            orig_id INT,
            orig_time DATETIME,
            orig_topic TINYTEXT,
            CreatedTime DATETIME,
            GpsTime DATETIME,
            GsmSignal SMALLINT UNSIGNED,
            SatelliteCount SMALLINT UNSIGNED,
            LicensePlate VARCHAR(10),
            VehicleType TINYINT UNSIGNED,
            Company VARCHAR(10),
            VehicleID INT UNSIGNED,
            Technology SMALLINT UNSIGNED,
            Ignition SMALLINT UNSIGNED,
            Longitude DECIMAL(14, 10),
            Latitude DECIMAL(14, 10),
            SpeedGps DECIMAL(9, 3),
            SpeedTach DECIMAL(9, 3),
            SpeedCan DECIMAL(9, 3),
            TachoGps DECIMAL(9, 3),
            TachoTach DECIMAL(9, 3),
            ModeDrive SMALLINT UNSIGNED,
            SpreadingMode SMALLINT UNSIGNED,
            Plow SMALLINT UNSIGNED,
            Gram BIGINT UNSIGNED,
            WidthLeft DECIMAL(9, 3),
            WidthRight DECIMAL(9, 3),
            SumSalt DECIMAL(18, 8) UNSIGNED,
            SumInert DECIMAL(18, 8) UNSIGNED,
            SumBrine DECIMAL(18, 8) UNSIGNED,
            Cuts1 SMALLINT UNSIGNED,
            Cuts2 SMALLINT UNSIGNED,
            Cuts3 SMALLINT UNSIGNED,
            CentralBroom SMALLINT UNSIGNED,
            LeftBroom SMALLINT UNSIGNED,
            RightBroom SMALLINT UNSIGNED,
            Turbine SMALLINT UNSIGNED,
            RunningShaft SMALLINT UNSIGNED,
            LeftFlushing SMALLINT UNSIGNED,
            RightFlushing SMALLINT UNSIGNED,
            CentralFlushing SMALLINT UNSIGNED,
            Misting SMALLINT UNSIGNED,
            Pump SMALLINT UNSIGNED,
            LightOn SMALLINT UNSIGNED,
            ModeArrow SMALLINT UNSIGNED,
            AkuVoltage DECIMAL(9, 3),
            RampUp SMALLINT UNSIGNED,
            Crash SMALLINT UNSIGNED,
            TempAir DECIMAL(9, 3),
            TempRoad DECIMAL(9, 3),
            Revs DECIMAL(18, 10) UNSIGNED,
            RevsExtension SMALLINT UNSIGNED,
            Fuel DECIMAL(9, 3),
            LevelPHM DECIMAL(9, 3),
            PowerVoltage DECIMAL(9, 3),
            Lighthouse SMALLINT UNSIGNED,
            PRIMARY KEY (id)
          )
      changed_when: true

    - name: Copy data
      ansible.builtin.copy:
        src: "{{ ansible_data_dir }}/{{ data_tar }}"
        dest: "{{ import_dir }}/{{ data_tar }}"
        mode: "0777"

    - name: Extract data
      ansible.builtin.shell: |
        tar --extract --use-compress-program=pigz \
        --file="{{ import_dir }}/{{ data_tar }}" \
        --directory="{{ import_dir }}"
        rm -f "{{ import_dir }}/{{ data_tar }}"
        chmod -R 0777 "{{ import_dir }}"
      args:
        executable: /bin/bash
      changed_when: true

    - name: Disable keys
      ansible.builtin.shell: |
        mysql {{ login_db }} -S /var/run/mysqld/mysqld.sock -e "ALTER TABLE {{ collection }} DISABLE KEYS;"
      args:
        executable: /bin/bash
      changed_when: false

    - name: Import data
      ansible.builtin.shell: |
        /usr/bin/time -f "DURATION_SECONDS=%e" \
        mysql {{ login_db }} -S /var/run/mysqld/mysqld.sock -e "
        LOAD DATA INFILE '{{ import_dir }}/{{ data_file }}'
        INTO TABLE {{ collection }}
        FIELDS TERMINATED BY ',' ENCLOSED BY '\"' 
        LINES TERMINATED BY '\n' 
        IGNORE 1 ROWS
        (
            orig_id,
            @orig_time,
            orig_topic,
            @CreatedTime,
            @GpsTime,
            GsmSignal,
            SatelliteCount,
            LicensePlate,
            VehicleType,
            Company,
            VehicleID,
            Technology,
            Ignition,
            Longitude,
            Latitude,
            SpeedGps,
            SpeedTach,
            SpeedCan,
            TachoGps,
            TachoTach,
            ModeDrive,
            SpreadingMode,
            Plow,
            Gram,
            WidthLeft,
            WidthRight,
            SumSalt,
            SumInert,
            SumBrine,
            Cuts1,
            Cuts2,
            Cuts3,
            CentralBroom,
            LeftBroom,
            RightBroom,
            Turbine,
            RunningShaft,
            LeftFlushing,
            RightFlushing,
            CentralFlushing,
            Misting,
            Pump,
            LightOn,
            ModeArrow,
            AkuVoltage,
            RampUp,
            Crash,
            TempAir,
            TempRoad,
            Revs,
            RevsExtension,
            Fuel,
            LevelPHM,
            PowerVoltage,
            Lighthouse
        )
        SET
            orig_time   = STR_TO_DATE(@orig_time, '%Y-%m-%dT%H:%i:%s.%f'),
            CreatedTime = STR_TO_DATE(@CreatedTime, '%Y-%m-%dT%H:%i:%s.%f'),
            GpsTime     = STR_TO_DATE(@GpsTime, '%Y-%m-%dT%H:%i:%s.%f');"
      args:
        executable: /bin/bash
      register: insert_time
      changed_when: true

    - name: Enable keys
      ansible.builtin.shell: |
        mysql {{ login_db }} -S /var/run/mysqld/mysqld.sock -e "ALTER TABLE {{ collection }} ENABLE KEYS;"
      args:
        executable: /bin/bash
      changed_when: false

    - name: Remove data file
      ansible.builtin.file:
        path: /var/lib/mysql-files/{{ data_file }}
        state: absent

- name: Verify data import
  hosts: mariadb
  tasks:
    - name: Query total SumSalt
      community.mysql.mysql_query:
        login_unix_socket: /var/run/mysqld/mysqld.sock
        login_db: "{{ login_db }}"
        query: "SELECT CAST(SUM(SumSalt * 1.0) AS DOUBLE) AS TotalSalt FROM {{ collection }};"
      register: query_result

    - name: Capture result
      ansible.builtin.set_fact:
        result: "{{ query_result.query_result[0][0]['TotalSalt'] | float }}"

    - name: Display total SumSalt
      ansible.builtin.debug:
        msg: "{{ result }}"

- name: Post processing
  hosts: mariadb
  tasks:
    - name: Common post processing
      ansible.builtin.include_tasks: "{{ ansible_common_dir }}/init/vm_post_processing.yml"
