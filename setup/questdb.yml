---
- name: Init QuestDB VM
  hosts: localhost
  vars_files:
    - "{{ ansible_vars_dir }}/host_vars/questdb.yml"
  tasks:
    - name: Init VM
      import_role:
        name: common

- name: Common config
  hosts: questdb
  tasks:
    - name: Setup config
      import_role:
        name: common
        tasks_from: vm_config

- name: Setup QuestDB
  hosts: questdb
  roles:
    - questdb

- name: Common config
  hosts: questdb
  tasks:
    - name: Setup config
      import_role:
        name: common
        tasks_from: post_processing