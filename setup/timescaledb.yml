---
- name: Init TimescaleDB VM
  hosts: localhost
  vars_files:
    - "{{ ansible_vars_dir }}/host_vars/timescaledb.yml"
  tasks:
    - name: Init VM
      import_role:
        name: common

- name: Common config
  hosts: timescaledb
  tasks:
    - name: Setup config
      import_role:
        name: common
        tasks_from: vm_config

- name: Setup TimescaleDB
  hosts: timescaledb
  roles:
    - timescaledb

- name: Common config
  hosts: timescaledb
  tasks:
    - name: Setup config
      import_role:
        name: common
        tasks_from: post_processing