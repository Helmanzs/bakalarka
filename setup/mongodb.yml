---
- name: Init MongoDb VM
  hosts: localhost
  vars_files:
    - "{{ ansible_vars_dir }}/host_vars/mongodb.yml"
  tasks:
    - name: Init VM
      import_role:
        name: common

- name: Common config
  hosts: mongodb
  tasks:
    - name: Setup config
      import_role:
        name: common
        tasks_from: vm_config

- name: Setup MongoDB
  hosts: mongodb
  roles:
    - mongodb

- name: Common config
  hosts: mongodb
  tasks:
    - name: Setup config
      import_role:
        name: common
        tasks_from: post_processing