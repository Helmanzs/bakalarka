- name: Get query duration
  block:
  - name: Get duration from stderr
    ansible.builtin.set_fact:
      query_duration_ms: >-
        {{
          (
            query_execution.stderr_lines
            | select("match", "^DURATION_SECONDS=")
            | list
            | first
          )
          .split("=")[1]
          | float
        }}
    when: query_duration_ms is not defined and query_execution is defined
    
  - name: Convert duration to milliseconds if less than 1 second
    ansible.builtin.set_fact:
      query_duration_ms: >-
        {{
          (query_duration_ms | float) * 1000
          if (query_duration_ms | float) < 1
          else (query_duration_ms | float)
        }}

- name: Get rows read
  ansible.builtin.set_fact:
    rows_read: "NA"
  when: rows_read is not defined

- name: Get rows returned
  ansible.builtin.set_fact:
    rows_returned: "{{ query_rows_returned.stdout | string }}"
  when: rows_returned is not defined and query_rows_returned is defined

- name: Save result if in master run
  when: is_master_run | default(false)
  block:
    - name: Set local result fact on each host
      ansible.builtin.set_fact:
        local_result:
          test_type: "{{ hostvars['localhost'].test_type }}"
          host: "{{ inventory_hostname }}"
          query_duration_ms: "{{ query_duration_ms | default('0') }}"
          rows_read: "{{ rows_read | default('NA') }}"
          rows_returned: "{{ rows_returned | default('0') }}"
          ram_limit: "{{ hostvars['localhost'].ram_limit }}"
          cpu_limit: "{{ hostvars['localhost'].cpu_limit }}"
          cache: "{{ hostvars['localhost'].cache }}"

    - name: Append this host’s result to NDJSON file
      delegate_to: localhost
      ansible.builtin.lineinfile:
        path: "{{ results_dir }}/{{ test_type }}.ndjson"
        create: true
        insertafter: EOF
        line: "{{ local_result | to_json }}"

- name: Stop VM
  delegate_to: localhost
  community.general.lxd_container:
    name: "{{ vm_name }}"
    state: stopped
  failed_when: false
  changed_when: false