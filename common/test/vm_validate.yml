# tasks/validate_parameters.yml
- name: Get database options
  ansible.builtin.set_fact:
    databases: "{{ groups['databases'] | list }}"
  no_log: true

- name: Show available parameter options
  ansible.builtin.debug:
    msg: |
      Available options:
      - databases: {{ databases | join(', ') }}
      - caches: {{ caches | join(', ') }}
      - test types: {{ test_types | join(', ') }}
  when: database is not defined or cache is not defined or test_type is not defined

- name: Ask for parameters
  when: database is not defined or cache is not defined or test_type is not defined
  block:
    - name: Ask for database until valid
      ansible.builtin.pause:
        prompt: |
          Options (choose one):
          {% for db in databases %}
          - {{ db }}
          {% endfor %}
      register: database_input
      until: database_input.user_input in databases
      retries: 5
      delay: 2
      no_log: true  

    - name: Ask for cache until valid
      ansible.builtin.pause:
        prompt: |
          Options (choose one):
          {% for c in caches %}
          - {{ c }}
          {% endfor %}
      register: cache_input
      until: cache_input.user_input in caches
      retries: 5
      delay: 2
      no_log: true

    - name: Ask for test type until valid
      ansible.builtin.pause:
        prompt: |
          Options (choose one):
          {% for t in test_types %}
          - {{ t }}
          {% endfor %}
      register: test_type_input
      until: test_type_input.user_input in test_types
      retries: 5
      delay: 2
      no_log: true

    - name: Set parameters from user input
      ansible.builtin.set_fact:
        database: "{{ database_input.user_input }}"
        cache: "{{ cache_input.user_input }}"
        test_type: "{{ test_type_input.user_input }}"

- name: Show final configuration
  ansible.builtin.debug:
    msg: |
      Final configuration:
      - database: {{ database }}
      - cache: {{ cache }}
      - test_type: {{ test_type }}
