- name: Include ram profile
  ansible.builtin.include_vars:
    file: "{{ ansible_resources_dir }}/ram/{{ ram_profile | default(default_ram_profile) }}.yml"

- name: Include cpu profile
  ansible.builtin.include_vars:
    file: "{{ ansible_resources_dir }}/cpu/{{ cpu_profile | default(default_cpu_profile) }}.yml"

- name: Start VM if stopped
  community.general.lxd_container:
    name: "{{ vm_name }}"
    state: started
  register: vm_start
  changed_when: vm_start.changed

- name: Get VM IP Address
  ansible.builtin.include_tasks: "{{ ansible_common_dir }}/helper/get_ip.yml"
  vars:
    max_attempts: 6
    retry_delay: 5

- name: Wait for SSH to be available
  ansible.builtin.wait_for:
    host: "{{ vm_ip }}"
    port: 22
    timeout: 60
  register: ssh_check
  retries: 5
  delay: 10
  until: ssh_check is succeeded

