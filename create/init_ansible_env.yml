---
- name: Create LXC network profiles with static IPs
  hosts: localhost
  gather_facts: false

  vars:
    lxc_profiles:
      mariadb-net: 10.187.240.2
      questdb-net: 10.187.240.3
      opentsdb-net: 10.187.240.4
      influxdb-net: 10.187.240.5
      iotdb-net: 10.187.240.6
      clickhousedb-net: 10.187.240.7
      timescaledb-net: 10.187.240.8
      columnstoredb-net: 10.187.240.9
      mongodb-net: 10.187.240.10

    network_device_name: eth0
    network_device_type: nic
    network_nictype: bridged
    network_parent: lxdbr0

  tasks:
    - name: Get existing LXC profiles
      ansible.builtin.command:
        cmd: lxc profile list --format json
      register: existing_profiles_raw
      changed_when: false

    - name: Extract existing profile names
      ansible.builtin.set_fact:
        existing_profiles: >-
          {{ existing_profiles_raw.stdout
             | from_json
             | map(attribute='name')
             | list }}

    - name: Create missing LXC profiles
      ansible.builtin.command:
        cmd: lxc profile create "{{ item.key }}"
      when: item.key not in existing_profiles
      loop: "{{ lxc_profiles | dict2items }}"
      register: profile_creation
      changed_when: profile_creation.rc == 0

    - name: Configure static IP network device
      ansible.builtin.command:
        cmd: >
          lxc profile device add {{ item.key }} {{ network_device_name }}
          {{ network_device_type }}
          nictype={{ network_nictype }}
          parent={{ network_parent }}
          ipv4.address={{ item.value }}
      when: item.key not in existing_profiles
      loop: "{{ lxc_profiles | dict2items }}"
      changed_when: true
