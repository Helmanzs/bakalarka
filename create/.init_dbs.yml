    results_dir: "{{ global_results_dir }}"
    is_master_run: "{{ is_master_run | default(false) }}"

- name: Run OpenTSDB
  import_playbook: opentsdb/init.yml
  vars:
    results_dir: "{{ global_results_dir }}"
    is_master_run: "{{ is_master_run | default(false) }}"

- name: Run QuestDB
  import_playbook: questdb/init.yml
  vars:
    results_dir: "{{ global_results_dir }}"
    is_master_run: "{{ is_master_run | default(false) }}"

- name: Run TimescaleDB
  import_playbook: timescaledb/init.yml
  vars:
    results_dir: "{{ global_results_dir }}"
    is_master_run: "{{ is_master_run | default(false) }}"
