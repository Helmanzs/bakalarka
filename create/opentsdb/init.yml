---
- name: Init OpenTSDB VM
  hosts: localhost
  vars_files:
    - /etc/ansible/host_vars/opentsdb.yml

  tasks:
    - name: Check if LXD VM exists
      ansible.builtin.command:
        cmd: "lxc info {{ vm_name }}"
      register: vm_state
      ignore_errors: true
      changed_when: false

    - name: Stop the VM
      ansible.builtin.command:
        cmd: "lxc stop {{ vm_name }} --force"
      when: vm_state.rc == 0
      ignore_errors: true
      changed_when: false

    - name: Delete LXD VM if it exists
      community.general.lxd_container:
        name: "{{ vm_name }}"
        state: absent
      when: vm_state.rc == 0

    - name: Launch LXD VM
      community.general.lxd_container:
        name: "{{ vm_name }}"
        type: "{{ lxd_type_base }}"
        state: started
        source:
          type: image
          mode: pull
          server: "{{ lxd_image_server_base }}"
          protocol: "{{ lxd_image_protocol_base }}"
          alias: "{{ lxd_image_base }}"
        profiles: "{{ vm_profiles }}"
        config: "{{ vm_config }}"
        devices: "{{ vm_devices }}"
        wait_for_ipv4_addresses: true
        timeout: 600

    - name: Wait for VM to initialize
      ansible.builtin.wait_for:
        timeout: 10

- name: Configure VM
  hosts: opentsdb
  tasks:
    - name: Create tmp directory
      ansible.builtin.file:
        path: "{{ ansible_remote_tmp }}"
        state: directory
        mode: "1777"

    - name: Update system packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: "{{ apt_cache_valid_time_base }}"

    - name: Install packages
      ansible.builtin.apt:
        name: "{{ vm_packages }}"
        state: present
        update_cache: true
        cache_valid_time: "{{ apt_cache_valid_time_base }}"

