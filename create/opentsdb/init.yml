- name: Verify data import
  hosts: opentsdb
  tasks:
    - name: Query total SumSalt
      ansible.builtin.shell: >
        /usr/share/opentsdb/bin/tsdb query
        2023/01/01-00:00:00
        2025/01/01-00:00:00
        sum {{ login_db }}.SumSalt |
        awk '{sum += $3} END {print sum}'
      register: query_result
      changed_when: false

    - name: Display result
      ansible.builtin.debug:
        msg: "{{ query_result.stdout }}"
