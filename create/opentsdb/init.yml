- name: Configure SSH for HBase
  hosts: opentsdb
  tasks:
    - name: Ensure .ssh directory exists
      ansible.builtin.file:
        path: "/root/.ssh"
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Generate SSH key
      ansible.builtin.openssh_keypair:
        path: "/root/.ssh/id_rsa"
        size: 4096
        type: rsa
        owner: root
        group: root
        mode: "0600"
        force: false

    - name: Slurp remote root’s public key
      ansible.builtin.slurp:
        src: "/root/.ssh/id_rsa.pub"
      register: slurped_key

    - name: Add public key to authorized_keys
      ansible.builtin.authorized_key:
        user: root
        key: "{{ slurped_key.content | b64decode }}"
        state: present
        path: "/root/.ssh/authorized_keys"

    - name: Remove any existing 127.0.0.1 entry from known_hosts
      ansible.builtin.known_hosts:
        path: "/root/.ssh/known_hosts"
        name: 127.0.0.1
        state: absent

    - name: Disable strict host key checking
      ansible.builtin.blockinfile:
        path: "/root/.ssh/config"
        create: yes
        block: |
          Host 127.0.0.1
              StrictHostKeyChecking no
              UserKnownHostsFile=/dev/null
        owner: root
        group: root
        mode: "0600"

- name: Install and configure HBase
  hosts: opentsdb
  gather_facts: false
  tasks:
    - name: Download HBase
      ansible.builtin.get_url:
        url: "{{ hbase_tar_url }}"
        dest: /opt/hbase-{{ hbase_version }}-bin.tar.gz

    - name: Extract HBase
      ansible.builtin.unarchive:
        src: /opt/hbase-{{ hbase_version }}-bin.tar.gz
        dest: /opt
        remote_src: true

    - name: Create symbolic link
      ansible.builtin.file:
        src: /opt/hbase-{{ hbase_version }}
        dest: /hbase
        state: link

    - name: Clean up HBase archive
      ansible.builtin.file:
        path: /opt/hbase-{{ hbase_version }}-bin.tar.gz
        state: absent

    - name: Configure HBase environment exports
      ansible.builtin.lineinfile:
        path: /hbase/conf/hbase-env.sh
        regexp: "^#?export {{ item.key }}="
        line: "export {{ item.key }}={{ item.value }}"
        backrefs: no
      loop: "{{ hbase_env_settings | dict2items }}"

    - name: Enable distributed mode
      ansible.builtin.xml:
        path: /hbase/conf/hbase-site.xml
        xpath: '//property[name="hbase.cluster.distributed"]/value'
        value: "true"

    - name: Start HBase
      ansible.builtin.command:
        cmd: /hbase/bin/start-hbase.sh
        creates: /hbase/logs/hbase-root-master-opentsdb.log

- name: Install and configure OpenTSDB
  hosts: opentsdb
  gather_facts: false
  tasks:
    - name: Download OpenTSDB
      ansible.builtin.get_url:
        url: "{{ db_deb_url }}"
        dest: /opt/opentsdb-{{ db_version }}_all.deb

    - name: Install OpenTSDB
      ansible.builtin.apt:
        deb: /opt/opentsdb-{{ db_version }}_all.deb

    - name: Clean up OpenTSDB package
      ansible.builtin.file:
        path: /opt/opentsdb-{{ db_version }}_all.deb
        state: absent

    - name: Configure OpenTSDB settings
      ansible.builtin.lineinfile:
        path: /etc/opentsdb/opentsdb.conf
        regexp: "^{{ item.regex }}"
        line: "{{ item.line }}"
      loop:
        - {
            regex: '^#?\s*tsd\.core\.auto_create_metrics\s*=',
            line: "tsd.core.auto_create_metrics = true",
          }
        - {
            regex: '^#?\s*tsd\.core\.auto_create_tagks\s*=',
            line: "tsd.core.auto_create_tagks = true",
          }
        - {
            regex: '^#?\s*tsd\.core\.auto_create_tagvs\s*=',
            line: "tsd.core.auto_create_tagvs = true",
          }

    - name: Create OpenTSDB tables
      ansible.builtin.command: >
        env COMPRESSION=NONE HBASE_HOME=/hbase
        /usr/share/opentsdb/tools/create_table.sh
      changed_when: true

    - name: Start OpenTSDB service
      ansible.builtin.systemd:
        name: opentsdb
        state: started
        enabled: true

- name: Setup database and import data
  hosts: opentsdb
  gather_facts: false
  tasks:
    # - name: Push and extract data
    #   ansible.builtin.unarchive:
    #     src: "{{  ansible_data_dir }}/{{ data_tar }}"
    #     dest: "/tmp/"
    #     mode: "0777"

    - name: Push data
      ansible.builtin.copy:
        src: "{{ ansible_data_dir }}/{{ data_file }}"
        dest: "/tmp/"
        mode: "0777"

    - name: Split and compress data file
      ansible.builtin.shell: |
        set -euo pipefail
        exec > >(gzip > "/tmp/split_script.log.gz") 2>&1 
        n=1
        zcat "/tmp/{{ data_file }}" | while IFS= read -r line; do
          if [ $(( (i++) % {{ db_chunk_size }} )) -eq 0 ]; then
            [ -n "$out" ] && gzip -c > "$out"
            out="/tmp/{{ data_file | regex_replace('\.gz$', '') }}.$(printf "%03d" $n).gz"
            n=$((n+1))
          fi
          printf "%s\n" "$line" || exit 1
        done
        [ -n "$out" ] && gzip -c > "$out"
      args:
        executable: /bin/bash
        creates: "/tmp/{{ data_file | regex_replace('\\.gz$', '') }}.001.gz"

    - name: Clean up data
      ansible.builtin.file:
        path: "/tmp/{{ data_file }}"
        state: absent

    - name: find all the chunk files
      ansible.builtin.find:
        paths: /tmp
        patterns: "{{ data_file_name }}.*"
      register: chunk_files

    - name: import each chunk into OpenTSDB
      ansible.builtin.command:
        cmd: "/usr/share/opentsdb/bin/tsdb import {{ item.path }}"
      loop: "{{ chunk_files.files }}"
      loop_control:
        label: "{{ item.path }}"
      register: import_results
      retries: 3
      delay: 5
      until: import_results.rc == 0

    - name: remove temporary chunk files
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ chunk_files.files }}"
