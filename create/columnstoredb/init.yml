---
- name: Init ColumnstoreDB VM
  hosts: localhost
  vars_files:
    - /etc/ansible/host_vars/columnstoredb.yml
  tasks:
    - name: Init VM
      ansible.builtin.include_tasks: "{{ common_dir }}/vm_init.yml"

- name: Common config
  hosts: columnstoredb
  tasks:
    - name: Init VM
      ansible.builtin.include_tasks: "{{ common_dir }}/vm_config.yml"

- name: Configure VM
  hosts: columnstoredb
  tasks:
    - name: Configure sysctl parameters
      ansible.builtin.copy:
        dest: /etc/sysctl.d/90-mariadb-columnstore.conf
        content: |
          # BEGIN ANSIBLE MANAGED BLOCK - SYSCTL PARAMETERS
          {% for item in vm_sysctl_params %}
          {{ item.name }} = {{ item.value }}
          {% endfor %}
          # END ANSIBLE MANAGED BLOCK - SYSCTL PARAMETERS

    - name: Apply sysctl settings
      ansible.builtin.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
        sysctl_set: yes
      loop: "{{ vm_sysctl_params }}"

    - name: Disable AppArmor
      ansible.builtin.systemd:
        name: apparmor
        state: stopped
        enabled: no

    - name: Configure locale
      ansible.builtin.command:
        cmd: localedef -i en_US -f UTF-8 en_US.UTF-8
      changed_when: true

    - name: Reboot VM to apply changes
      ansible.builtin.reboot:
        msg: "Rebooting after system configuration"
        connect_timeout: 30
        reboot_timeout: 300

- name: Install and configure MariaDB ColumnStore
  hosts: columnstoredb
  tasks:
    - name: Add MariaDB APT key
      ansible.builtin.apt_key:
        state: present
        url: "{{ db_apt_key }}"

    - name: Add MariaDB APT repository
      ansible.builtin.apt_repository:
        repo: >
          deb [arch=amd64]
          http://mirror.mariadb.org/repo/{{ mariadb_version }}/ubuntu
          {{ ansible_distribution_release | lower }} main
        state: present
        filename: mariadb

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install MariaDB with ColumnStore
      ansible.builtin.apt:
        name:
          - mariadb-server
          - mariadb-backup
          - mariadb-client
          - mariadb-plugin-columnstore
        state: latest
        update_cache: true

    - name: Configure MariaDB basic settings
      ansible.builtin.copy:
        dest: /etc/mysql/mariadb.conf.d/90-columnstore.cnf
        content: |
          # BEGIN ANSIBLE MANAGED BLOCK - COLUMNSTORE PARAMETERS
          [mariadb]
          log_error = mariadbd.err
          character_set_server = utf8
          collation_server = utf8_general_ci
          # END ANSIBLE MANAGED BLOCK - COLUMNSTORE PARAMETERS

    - name: Set CrossEngineSupport configuration
      ansible.builtin.command:
        cmd: "mcsSetConfig {{ item.key }} {{ item.value }}"
      loop: "{{ db_cross_engine_config }}"

    - name: Start and enable MariaDB
      ansible.builtin.service:
        name: mariadb
        state: started
        enabled: true

    - name: Start and enable ColumnStore service
      ansible.builtin.service:
        name: mariadb-columnstore
        state: started
        enabled: true

- name: Setup database and import data
  hosts: columnstoredb
  tasks:
    - name: Create cross-engine user
      community.mysql.mysql_user:
        name: cross_engine
        password: cross_engine
        host: "{{ item }}"
        priv: "*.*:SELECT,PROCESS"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock
      loop: "{{ db_user_host }}"

    - name: Restart services
      ansible.builtin.service:
        name: "{{ item }}"
        state: restarted
      loop:
        - mariadb
        - mariadb-columnstore

    - name: Create database
      community.mysql.mysql_db:
        login_unix_socket: /var/run/mysqld/mysqld.sock
        name: "{{ login_db }}"
        state: present

    - name: Create ColumnStore table
      community.mysql.mysql_query:
        login_unix_socket: /var/run/mysqld/mysqld.sock
        query: |
          CREATE TABLE {{ login_db }}.{{ collection }} (
            orig_id BIGINT,
            orig_time DATETIME,
            orig_topic VARCHAR(50),
            CreatedTime DATETIME,
            GpsTime DATETIME,
            GsmSignal TINYINT UNSIGNED,
            SatelliteCount SMALLINT UNSIGNED,
            LicensePlate VARCHAR(20),
            VehicleType TINYINT,
            Company VARCHAR(50),
            VehicleID BIGINT,
            Technology TINYINT,
            Ignition TINYINT,
            Longitude DECIMAL(9, 5),
            Latitude DECIMAL(8, 5),
            SpeedGps DECIMAL(6, 2),
            SpeedTach DECIMAL(6, 2),
            SpeedCan DECIMAL(6, 2),
            TachoGps DECIMAL(6, 2),
            TachoTach DECIMAL(6, 2),
            ModeDrive TINYINT,
            SpreadingMode TINYINT,
            Plow TINYINT,
            Gram BIGINT UNSIGNED,
            WidthLeft DECIMAL(4, 2),
            WidthRight DECIMAL(4, 2),
            SumSalt DECIMAL(20,4) UNSIGNED,
            SumInert DECIMAL(20,4) UNSIGNED,
            SumBrine DECIMAL(20,4) UNSIGNED,
            Cuts1 TINYINT,
            Cuts2 TINYINT,
            Cuts3 TINYINT,
            CentralBroom TINYINT,
            LeftBroom TINYINT,
            RightBroom TINYINT,
            Turbine TINYINT,
            RunningShaft TINYINT,
            LeftFlushing TINYINT,
            RightFlushing TINYINT,
            CentralFlushing TINYINT,
            Misting TINYINT,
            Pump TINYINT,
            LightOn TINYINT,
            ModeArrow TINYINT,
            AkuVoltage DECIMAL(4, 2),
            RampUp TINYINT,
            Crash TINYINT,
            TempAir DECIMAL(6, 2),
            TempRoad DECIMAL(5, 2),
            Revs DECIMAL(20,4) UNSIGNED,
            RevsExtension BIGINT,
            Fuel DECIMAL(6, 2),
            LevelPHM DECIMAL(6, 2),
            PowerVoltage DECIMAL(5, 2),
            Lighthouse TINYINT
          ) ENGINE=Columnstore

    - name: Push and extract data
      ansible.builtin.unarchive:
        src: "{{ ansible_data_dir }}/{{ data_tar }}"
        dest: "/tmp/"
        mode: "0777"

    - name: Remove CSV header
      ansible.builtin.shell: |
        tail -n +2 /tmp/{{ data_file }}> /tmp/tmp.csv
        mv /tmp/tmp.csv /tmp/{{ data_file }}
      args:
        executable: /bin/bash

    - name: Import data with cpimport
      ansible.builtin.command: |
        cpimport -s ',' {{ login_db }} {{ collection }} /tmp/{{ data_file }}
      args:
        executable: /bin/bash

    - name: Remove data file
      ansible.builtin.file:
        path: /tmp/{{ data_file }}
        state: absent

- name: Verify data import
  hosts: columnstoredb
  tasks:
    - name: Query total SumSalt
      community.mysql.mysql_query:
        login_unix_socket: /var/run/mysqld/mysqld.sock
        login_db: "{{ login_db }}"
        query: "SELECT CAST(SUM(SumSalt * 1.0) AS DOUBLE) AS TotalSalt FROM {{ collection }};"
      register: query_result

    - name: Capture result
      ansible.builtin.set_fact:
        result: "{{ query_result.query_result[0][0]['TotalSalt'] | float }}"

    - name: Display result
      ansible.builtin.debug:
        msg: "{{ result }}"

- name: Post processing
  hosts: columnstoredb
  tasks:
    - name: Common post processing
      ansible.builtin.include_tasks: "{{ common_dir }}/vm_post_processing.yml"
