---
- name: Setup environment
  ansible.builtin.import_playbook: init_ansible_env.yml

- name: Initialize results system
  hosts: localhost
  tasks:
    - name: Check if results directory exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/results"
      register: results_dir_stat

    - name: Create results directory
      ansible.builtin.file:
        path: "{{ playbook_dir }}/results"
        state: directory
        mode: "0755"

    - name: Set global results path
      ansible.builtin.set_fact:
        global_results_dir: "{{ playbook_dir }}/results"
        is_master_run: true

- name: Run ClickHouse
  ansible.builtin.import_playbook: clickhousedb/init.yml
  vars:
    results_dir: "{{ hostvars['localhost'].global_results_dir }}"
    is_master_run: "{{ hostvars['localhost'].is_master_run }}"

- name: Run ColumnStore
  ansible.builtin.import_playbook: columnstoredb/init.yml
  vars:
    results_dir: "{{ hostvars['localhost'].global_results_dir }}"
    is_master_run: "{{ hostvars['localhost'].is_master_run }}"

- name: Run InfluxDB
  ansible.builtin.import_playbook: influxdb/init.yml
  vars:
    results_dir: "{{ hostvars['localhost'].global_results_dir }}"
    is_master_run: "{{ hostvars['localhost'].is_master_run }}"

- name: Run IoTDB
  ansible.builtin.import_playbook: iotdb/init.yml
  vars:
    results_dir: "{{ hostvars['localhost'].global_results_dir }}"
    is_master_run: "{{ hostvars['localhost'].is_master_run }}"

- name: Run MariaDB
  ansible.builtin.import_playbook: mariadb/init.yml
  vars:
    results_dir: "{{ hostvars['localhost'].global_results_dir }}"
    is_master_run: "{{ hostvars['localhost'].is_master_run }}"

- name: Run MongoDB
  ansible.builtin.import_playbook: mongodb/init.yml
  vars:
    results_dir: "{{ hostvars['localhost'].global_results_dir }}"
    is_master_run: "{{ hostvars['localhost'].is_master_run }}"

- name: Run OpenTSDB
  ansible.builtin.import_playbook: opentsdb/init.yml
  vars:
    results_dir: "{{ hostvars['localhost'].global_results_dir }}"
    is_master_run: "{{ hostvars['localhost'].is_master_run }}"

- name: Run QuestDB
  ansible.builtin.import_playbook: questdb/init.yml
  vars:
    results_dir: "{{ hostvars['localhost'].global_results_dir }}"
    is_master_run: "{{ hostvars['localhost'].is_master_run }}"

- name: Run TimescaleDB
  ansible.builtin.import_playbook: timescaledb/init.yml
  vars:
    results_dir: "{{ hostvars['localhost'].global_results_dir }}"
    is_master_run: "{{ hostvars['localhost'].is_master_run }}"

- name: Display aggregated results
  hosts: localhost
  tasks:
    - name: Find result files
      ansible.builtin.find:
        paths: "{{ global_results_dir }}"
        patterns: "*.json"
        file_type: file
      register: found_files

    - name: Set empty list if no files
      ansible.builtin.set_fact:
        all_results: []
      when: found_files.matched == 0

    - name: Read and parse result files
      block:
        - name: Read each file
          ansible.builtin.slurp:
            src: "{{ item }}"
          loop: "{{ found_files.files | map(attribute='path') | list }}"
          register: result_contents

        - name: Extract and parse content
          ansible.builtin.set_fact:
            all_results: "{{ result_contents.results | map(attribute='content') | map('b64decode') | map('from_json') | list }}"
      when: found_files.matched > 0

    - name: Show all results
      ansible.builtin.debug:
        msg: "{{ item.db }} ({{ item.host }}): {{ item.sum_salt }}"
      loop: "{{ all_results | default([]) }}"

    # - name: Cleanup results directory
    #   ansible.builtin.file:
    #     path: "{{ global_results_dir }}"
    #     state: absent
