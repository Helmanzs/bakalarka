---
- name: Init QuestDB VM
  hosts: localhost
  vars_files:
    - /etc/ansible/host_vars/questdb.yml

  tasks:
    - name: Check if LXD VM exists
      ansible.builtin.command:
        cmd: "lxc info {{ vm_name }}"
      register: vm_state
      ignore_errors: true
      changed_when: false

    - name: Stop the VM
      ansible.builtin.command:
        cmd: "lxc stop {{ vm_name }} --force"
      when: vm_state.rc == 0
      ignore_errors: true
      changed_when: false

    - name: Delete LXD VM if it exists
      community.general.lxd_container:
        name: "{{ vm_name }}"
        state: absent
      when: vm_state.rc == 0

    - name: Launch LXD VM
      community.general.lxd_container:
        name: "{{ vm_name }}"
        type: "{{ lxd_type_base }}"
        state: started
        source:
          type: image
          mode: pull
          server: "{{ lxd_image_server_base }}"
          protocol: "{{ lxd_image_protocol_base }}"
          alias: "{{ lxd_image_base }}"
        profiles: "{{ vm_profiles }}"
        config: "{{ vm_config }}"
        devices: "{{ vm_devices }}"
        wait_for_ipv4_addresses: true
        timeout: 600

    - name: Wait for VM init
      ansible.builtin.wait_for:
        timeout: 10

- name: Configure VM
  hosts: questdb
  tasks:
    - name: Create tmp directory
      ansible.builtin.file:
        path: "{{ ansible_remote_tmp }}"
        state: directory
        mode: "1777"

    - name: Update system packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: "{{ apt_cache_valid_time_base }}"

    - name: Install packages
      ansible.builtin.apt:
        name: "{{ vm_packages }}"
        state: present
        update_cache: true
        cache_valid_time: "{{ apt_cache_valid_time_base }}"

- name: Install and configure QuestDB
  hosts: questdb
  tasks:
    - name: Download QuestDB
      ansible.builtin.get_url:
        url: "{{ db_tar_url }}"
        dest: /tmp/questdb.tar.gz
        mode: "0777"

    - name: Extract QuestDB
      ansible.builtin.unarchive:
        src: /tmp/questdb.tar.gz
        dest: /root/
        remote_src: true
        creates: /root/questdb

    - name: Rename QuestDB folder
      ansible.builtin.command:
        cmd: mv /root/questdb-{{  db_version }}-rt-linux-x86-64 /root/questdb
      args:
        removes: /root/questdb-{{ db_version }}-rt-linux-x86-64
        creates: /root/questdb

    - name: Clean up download
      ansible.builtin.file:
        path: /tmp/questdb.tar.gz
        state: absent

    - name: Start QuestDB service
      ansible.builtin.command:
        cmd: /root/questdb/bin/questdb.sh start
      changed_when: false

- name: Setup database and import data
  hosts: questdb
  tasks:
    - name: Create table
      community.postgresql.postgresql_query:
        query: >
          CREATE TABLE IF NOT EXISTS {{ collection }} (
            orig_id          INT,
            orig_time        TIMESTAMP,
            orig_topic       STRING,
            CreatedTime      TIMESTAMP,
            GpsTime          TIMESTAMP,
            GsmSignal        INT,
            SatelliteCount   INT,
            LicensePlate     STRING,
            VehicleType      INT,
            Company          STRING,
            VehicleID        INT,
            Technology       INT,
            Ignition         INT,
            Longitude        DOUBLE,
            Latitude         DOUBLE,
            SpeedGps         DOUBLE,
            SpeedTach        DOUBLE,
            SpeedCan         DOUBLE,
            TachoGps         DOUBLE,
            TachoTach        DOUBLE,
            ModeDrive        INT,
            SpreadingMode    INT,
            Plow             INT,
            Gram             INT,
            WidthLeft        DOUBLE,
            WidthRight       DOUBLE,
            SumSalt          DOUBLE,
            SumInert         DOUBLE,
            SumBrine         DOUBLE,
            Cuts1            INT,
            Cuts2            INT,
            Cuts3            INT,
            CentralBroom     INT,
            LeftBroom        INT,
            RightBroom       INT,
            Turbine          INT,
            RunningShaft     INT,
            LeftFlushing     INT,
            RightFlushing    INT,
            CentralFlushing  INT,
            Misting          INT,
            Pump             INT,
            LightOn          INT,
            ModeArrow        INT,
            AkuVoltage       DOUBLE,
            RampUp           INT,
            Crash            INT,
            TempAir          DOUBLE,
            TempRoad         DOUBLE,
            Revs             DOUBLE,
            RevsExtension    INT,
            Fuel             DOUBLE,
            LevelPHM         DOUBLE,
            PowerVoltage     DOUBLE,
            Lighthouse       INT
          ) TIMESTAMP(orig_time) PARTITION BY DAY;
        login_host: "{{ db_host }}"
        login_port: "{{ db_port }}"
        login_user: "{{ db_user }}"
        login_password: "{{ db_password }}"
        login_db: "{{ login_db }}"

    - name: Push and extract data
      ansible.builtin.unarchive:
        src: "{{  ansible_data_dir }}/{{ data_tar }}"
        dest: "/root/.questdb/import/"
        mode: "0777"

    - name: Import data
      community.postgresql.postgresql_query:
        query: >
          COPY {{ collection }}
          FROM '{{ data_file }}'
          WITH HEADER true
          TIMESTAMP 'orig_time'
        login_host: "{{ db_host }}"
        login_port: "{{ db_port }}"
        login_user: "{{ db_user }}"
        login_password: "{{ db_password }}"
        login_db: "{{ login_db }}"

    - name: Wait for import to finish
      community.postgresql.postgresql_query:
        query: SELECT COUNT(*) AS count FROM {{ collection }};
        login_host: "{{ db_host }}"
        login_port: "{{ db_port }}"
        login_user: "{{ db_user }}"
        login_password: "{{ db_password }}"
        login_db: "{{ login_db }}"
      register: result
      until: result.query_result[0].count | int >= 600000
      retries: "{{ db_import_retries }}"
      delay: "{{ db_import_retry_inverval }}"

    - name: Remove data file
      ansible.builtin.file:
        path: /root/.questdb/import/{{ data_file }}
        state: absent

- name: Verify data import
  hosts: questdb
  tasks:
    - name: Query total SumSalt
      community.postgresql.postgresql_query:
        query: SELECT sum(sumsalt) FROM {{ collection }};
        login_host: "{{ db_host }}"
        login_port: "{{ db_port }}"
        login_user: "{{ db_user }}"
        login_password: "{{ db_password }}"
        login_db: "{{ login_db }}"
      register: query_result

    - name: Capture result
      ansible.builtin.set_fact:
        result: "{{ query_result.query_result[0].sum | float }}"

    - name: Display result
      ansible.builtin.debug:
        msg: "{{ result }}"

- name: Post processing
  hosts: questdb
  tasks:
    - name: Save result if in master run
      block:
        - name: Ensure results directory exists
          file:
            path: "{{ results_dir }}"
            state: directory
          delegate_to: localhost

        - name: Save result to file
          copy:
            content: |
              {
                "db": "{{ vm_name }}",
                "host": "{{ inventory_hostname }}",
                "sum_salt": {{ result | to_json }}
              }
            dest: "{{ results_dir }}/{{ vm_name }}-{{ inventory_hostname }}.json"
          delegate_to: localhost
      when: is_master_run | default(false)
      run_once: true

    - name: Stop container
      community.general.lxd_container:
        name: "{{ vm_name }}"
        state: stopped
      delegate_to: localhost
